name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Grant permission to mvnw
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build package
        run: ./mvnw clean package -DskipTests

      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: target/*.jar